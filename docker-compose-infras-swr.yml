name: go-nomads-infras

# ============================================================
# 基础设施服务 - 默认从华为云 SWR 拉取镜像
# 使用方法:
#   docker compose -f docker-compose-infras-swr.yml up -d
# 或使用包装脚本默认启动 redis/rabbitmq/elasticsearch:
#   ./docker-compose-infras-swr.sh up -d
# 如需显式带上 consul:
#   ./docker-compose-infras-swr.sh --with-consul
#
# 可通过环境变量覆盖镜像源:
#   SWR_REGISTRY=swr.ap-southeast-3.myhuaweicloud.com
#   SWR_ORGANIZATION=go-nomads
# ============================================================

services:
  # Infrastructure Services
  redis:
    image: ${SWR_REGISTRY:-swr.ap-southeast-3.myhuaweicloud.com}/${SWR_ORGANIZATION:-go-nomads}/redis:7-alpine
    container_name: go-nomads-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - gonomads-network

  rabbitmq:
    image: ${SWR_REGISTRY:-swr.ap-southeast-3.myhuaweicloud.com}/${SWR_ORGANIZATION:-go-nomads}/rabbitmq:3-management-alpine
    container_name: go-nomads-rabbitmq
    ports:
      - "5672:5672"    # AMQP protocol port
      - "15672:15672"  # Management UI
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - gonomads-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  elasticsearch:
    image: ${SWR_REGISTRY:-swr.ap-southeast-3.myhuaweicloud.com}/${SWR_ORGANIZATION:-go-nomads}/elasticsearch:8.11.0
    container_name: go-nomads-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - gonomads-network

  consul:
    image: ${SWR_REGISTRY:-swr.ap-southeast-3.myhuaweicloud.com}/${SWR_ORGANIZATION:-go-nomads}/consul:latest
    container_name: go-nomads-consul
    ports:
      - "7500:7500"
      - "7502:7502"
      - "7600:7600/udp"
    volumes:
      - ./deployment/consul/consul-local.json:/consul/config/consul.json
      - consul_data:/consul/data
    environment:
      - CONSUL_DATA_DIR=/consul/data
    # Bind to all interfaces so the single server can bootstrap and be reachable
    command: ["consul", "agent", "-config-file=/consul/config/consul.json", "-data-dir=/consul/data", "-bind=0.0.0.0", "-client=0.0.0.0"]
    networks:
      - gonomads-network

networks:
  gonomads-network:
    name: go-nomads-network
    driver: bridge

volumes:
  redis_data:
  rabbitmq_data:
  elasticsearch_data:
  consul_data:
