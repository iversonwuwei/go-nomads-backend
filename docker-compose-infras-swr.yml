name: go-nomads-infras

# ============================================================
# 基础设施服务
# 使用方法:
#   docker compose -f docker-compose-infras-swr.yml up -d
#
# 镜像策略:
#   - 本地开发默认使用官方多架构镜像，避免 macOS ARM 上因 SWR 中缺少 arm64 manifest 导致拉取失败
#   - Linux 服务器可通过包装脚本自动切换到 SWR，或显式传入 --use-swr
#
# 包装脚本默认启动 redis/rabbitmq/elasticsearch/nginx:
#   ./docker-compose-infras-swr.sh up -d
# 如需显式强制使用 SWR:
#   ./docker-compose-infras-swr.sh --use-swr up -d
#
# 可通过环境变量覆盖完整镜像:
#   REDIS_IMAGE=...
#   RABBITMQ_IMAGE=...
#   ELASTICSEARCH_IMAGE=...
#   NGINX_IMAGE=...
# ============================================================

services:
  # Infrastructure Services
  redis:
    image: ${REDIS_IMAGE:-redis:7.4}
    container_name: go-nomads-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - gonomads-network

  rabbitmq:
    image: ${RABBITMQ_IMAGE:-rabbitmq:3-management-alpine}
    container_name: go-nomads-rabbitmq
    ports:
      - "5672:5672"    # AMQP protocol port
      - "15672:15672"  # Management UI
    environment:
      - RABBITMQ_DEFAULT_USER=walden
      - RABBITMQ_DEFAULT_PASS=walden
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - gonomads-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  elasticsearch:
    image: ${ELASTICSEARCH_IMAGE:-docker.elastic.co/elasticsearch/elasticsearch:8.17.4}
    container_name: go-nomads-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - gonomads-network

  nginx:
    image: ${NGINX_IMAGE:-nginx:1.29.6}
    container_name: go-nomads-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deployment/nginx/nginx.https.conf:/etc/nginx/conf.d/default.conf:ro
      - ${LETSENCRYPT_DIR:-/etc/letsencrypt}:/etc/letsencrypt:ro
      - ${CERTBOT_WEBROOT:-./deployment/nginx/certbot-www}:/var/www/certbot:ro
    networks:
      - gonomads-network

networks:
  gonomads-network:
    external: true
    name: go-nomads-network

volumes:
  redis_data:
  rabbitmq_data:
  elasticsearch_data:
