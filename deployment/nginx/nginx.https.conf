upstream gateway {
    server go-nomads-gateway:5000;
}

upstream webapp {
    server go-nomads-web:3000;
}

# HTTP entrypoint: serve ACME challenge and redirect everything else to HTTPS.
server {
    listen 80;
    server_name go-nomads.com www.go-nomads.com api.go-nomads.com;

    access_log /var/log/nginx/http-redirect.access.log;
    error_log /var/log/nginx/http-redirect.error.log;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name go-nomads.com www.go-nomads.com;

    ssl_certificate /etc/letsencrypt/live/go-nomads.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/go-nomads.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/go-nomads.com/chain.pem;

    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    access_log /var/log/nginx/go-nomads-ssl.access.log;
    error_log /var/log/nginx/go-nomads-ssl.error.log;

    client_max_body_size 100M;
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    location / {
        proxy_pass http://webapp;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}

server {
    listen 443 ssl http2;
    server_name api.go-nomads.com;

    ssl_certificate /etc/letsencrypt/live/go-nomads.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/go-nomads.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/go-nomads.com/chain.pem;

    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    access_log /var/log/nginx/api-go-nomads-ssl.access.log;
    error_log /var/log/nginx/api-go-nomads-ssl.error.log;

    client_max_body_size 100M;
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    location / {
        proxy_pass http://gateway;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With" always;
        if ($request_method = 'OPTIONS') {
            return 204;
        }
        proxy_buffering off;
        proxy_request_buffering off;
    }

    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}