apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    app.kubernetes.io/version: 1.0.0
  labels:
    app: accommodation-service
    app.kubernetes.io/component: backend
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: accommodation-service
    app.kubernetes.io/part-of: go-nomads-platform
  name: accommodation-service
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: accommodation-service
      app.kubernetes.io/managed-by: kustomize
      app.kubernetes.io/part-of: go-nomads-platform
  template:
    metadata:
      annotations:
        app.kubernetes.io/version: 1.0.0
        prometheus.io/path: /metrics
        prometheus.io/port: "5204"
        prometheus.io/scrape: "true"
      labels:
        app: accommodation-service
        app.kubernetes.io/managed-by: kustomize
        app.kubernetes.io/part-of: go-nomads-platform
    spec:
      containers:
      - env:
        - name: ASPNETCORE_ENVIRONMENT
          valueFrom:
            configMapKeyRef:
              key: ASPNETCORE_ENVIRONMENT
              name: go-nomads-config
        - name: ASPNETCORE_URLS
          value: http://+:5204
        - name: ConnectionStrings__DefaultConnection
          valueFrom:
            secretKeyRef:
              key: DATABASE_CONNECTION_STRING
              name: go-nomads-secrets
        - name: ConnectionStrings__Redis
          valueFrom:
            secretKeyRef:
              key: REDIS_CONNECTION_STRING
              name: go-nomads-secrets
        - name: Supabase__Url
          valueFrom:
            secretKeyRef:
              key: SUPABASE_URL
              name: go-nomads-secrets
        - name: Supabase__Key
          valueFrom:
            secretKeyRef:
              key: SUPABASE_KEY
              name: go-nomads-secrets
        image: swr.ap-southeast-3.myhuaweicloud.com/go-nomads/go-nomads-accommodation-service:latest
        imagePullPolicy: Always
        livenessProbe:
          httpGet:
            path: /health
            port: 5204
          initialDelaySeconds: 30
          periodSeconds: 15
        name: accommodation-service
        ports:
        - containerPort: 5204
          name: http
        readinessProbe:
          httpGet:
            path: /health
            port: 5204
          initialDelaySeconds: 10
          periodSeconds: 5
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 200m
            memory: 256Mi
      imagePullSecrets:
      - name: docker-registry-secret
---
