apiVersion: v1
kind: ConfigMap
metadata:
  name: go-nomads-config
  namespace: go-nomads
  labels:
    app.kubernetes.io/name: go-nomads
    app.kubernetes.io/part-of: go-nomads-platform
data:
  # ASP.NET Core 配置
  ASPNETCORE_ENVIRONMENT: "Production"
  
  # Redis 配置
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  
  # RabbitMQ 配置
  RABBITMQ_HOST: "rabbitmq-service"
  RABBITMQ_PORT: "5672"
  RABBITMQ_MANAGEMENT_PORT: "15672"
  
  # Elasticsearch 配置
  ELASTICSEARCH_HOST: "elasticsearch-service"
  ELASTICSEARCH_PORT: "9200"
  
  # Zipkin 配置
  ZIPKIN_PORT: "9411"
  
  # 服务发现配置
  GATEWAY_URL: "http://gateway-service:80"
  USER_SERVICE_URL: "http://user-service:80"
  CITY_SERVICE_URL: "http://city-service:5202"
  COWORKING_SERVICE_URL: "http://coworking-service:5203"
  ACCOMMODATION_SERVICE_URL: "http://accommodation-service:5204"
  EVENT_SERVICE_URL: "http://event-service:5205"
  INNOVATION_SERVICE_URL: "http://innovation-service:5206"
  TRAVEL_PLANNING_SERVICE_URL: "http://travel-planning-service:5207"
  ECOMMERCE_SERVICE_URL: "http://ecommerce-service:5208"
  AI_SERVICE_URL: "http://ai-service:5209"
  MESSAGE_SERVICE_URL: "http://message-service:5005"
  CACHE_SERVICE_URL: "http://cache-service:5210"
