apiVersion: apps/v1
kind: Deployment
metadata:
  name: city-service
  namespace: go-nomads
  labels:
    app: city-service
    app.kubernetes.io/name: city-service
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: go-nomads-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: city-service
  template:
    metadata:
      labels:
        app: city-service
    spec:
      containers:
        - name: city-service
          image: ${DOCKER_REGISTRY}/go-nomads-city-service:${IMAGE_TAG:-latest}
          imagePullPolicy: Always
          ports:
            - containerPort: 8002
              name: http
          env:
            - name: ASPNETCORE_ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: go-nomads-config
                  key: ASPNETCORE_ENVIRONMENT
            - name: ASPNETCORE_URLS
              value: "http://+:8002"
            # Aspire ConnectionStrings
            - name: ConnectionStrings__rabbitmq
              valueFrom:
                secretKeyRef:
                  name: go-nomads-secrets
                  key: CONNECTIONSTRINGS_RABBITMQ
            - name: ConnectionStrings__DefaultConnection
              valueFrom:
                secretKeyRef:
                  name: go-nomads-secrets
                  key: DATABASE_CONNECTION_STRING
            - name: Supabase__Url
              valueFrom:
                secretKeyRef:
                  name: go-nomads-secrets
                  key: SUPABASE_URL
            - name: Supabase__Key
              valueFrom:
                secretKeyRef:
                  name: go-nomads-secrets
                  key: SUPABASE_KEY
            # Aspire Service Discovery
            - name: services__user-service__http__0
              value: "http://user-service:80"
            - name: services__cache-service__http__0
              value: "http://cache-service:80"
            - name: services__coworking-service__http__0
              value: "http://coworking-service:80"
            - name: services__event-service__http__0
              value: "http://event-service:80"
            - name: services__message-service__http__0
              value: "http://message-service:80"
            - name: services__ai-service__http__0
              value: "http://ai-service:80"
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 30
            periodSeconds: 15
      imagePullSecrets:
        - name: docker-registry-secret
---
apiVersion: v1
kind: Service
metadata:
  name: city-service
  namespace: go-nomads
  labels:
    app: city-service
spec:
  type: ClusterIP
  ports:
    - port: 8002
      targetPort: 8002
      name: http
  selector:
    app: city-service
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: city-service-hpa
  namespace: go-nomads
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: city-service
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
