apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: go-nomads
  labels:
    app: gateway
    app.kubernetes.io/name: gateway
    app.kubernetes.io/component: api-gateway
    app.kubernetes.io/part-of: go-nomads-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: ${DOCKER_REGISTRY}/go-nomads-gateway:${IMAGE_TAG:-latest}
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: ASPNETCORE_ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: go-nomads-config
                  key: ASPNETCORE_ENVIRONMENT
            - name: ASPNETCORE_URLS
              value: "http://+:8080"
            # Aspire Service Discovery — services__{name}__http__0 格式
            - name: services__user-service__http__0
              value: "http://user-service:80"
            - name: services__city-service__http__0
              value: "http://city-service:80"
            - name: services__product-service__http__0
              value: "http://product-service:80"
            - name: services__document-service__http__0
              value: "http://document-service:80"
            - name: services__coworking-service__http__0
              value: "http://coworking-service:80"
            - name: services__accommodation-service__http__0
              value: "http://accommodation-service:80"
            - name: services__event-service__http__0
              value: "http://event-service:80"
            - name: services__innovation-service__http__0
              value: "http://innovation-service:80"
            - name: services__ai-service__http__0
              value: "http://ai-service:80"
            - name: services__search-service__http__0
              value: "http://search-service:80"
            - name: services__cache-service__http__0
              value: "http://cache-service:80"
            - name: services__message-service__http__0
              value: "http://message-service:80"
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
      imagePullSecrets:
        - name: docker-registry-secret
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
  namespace: go-nomads
  labels:
    app: gateway
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8080
      name: http
  selector:
    app: gateway
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gateway-ingress
  namespace: go-nomads
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
    - hosts:
        - api.go-nomads.com
      secretName: go-nomads-tls
  rules:
    - host: api.go-nomads.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gateway-service
                port:
                  number: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: gateway-hpa
  namespace: go-nomads
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: gateway
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
