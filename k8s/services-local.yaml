# 本地开发环境 - 业务服务部署配置
# 使用本地构建的 Docker 镜像
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: go-nomads
  labels:
    app: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: go-nomads-gateway:local
          imagePullPolicy: Never
          ports:
            - containerPort: 5000
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: ASPNETCORE_ENVIRONMENT
              value: "Development"
            - name: ASPNETCORE_URLS
              value: "http://+:5000"
            - name: ConnectionStrings__Redis
              value: "redis-service:6379,abortConnect=false"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
  namespace: go-nomads
spec:
  type: ClusterIP
  ports:
    - port: 5000
      targetPort: 5000
  selector:
    app: gateway
---
