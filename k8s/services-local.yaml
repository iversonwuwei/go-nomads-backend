# 本地开发环境 - 业务服务部署配置
# 使用本地构建的 Docker 镜像
# Aspire 兼容服务发现 + ConnectionStrings
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: go-nomads
  labels:
    app: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: go-nomads-gateway:local
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: "Development"
            - name: ASPNETCORE_URLS
              value: "http://+:8080"
            # Aspire Service Discovery
            - name: services__user-service__http__0
              value: "http://user-service:80"
            - name: services__city-service__http__0
              value: "http://city-service:8002"
            - name: services__coworking-service__http__0
              value: "http://coworking-service:8003"
            - name: services__event-service__http__0
              value: "http://event-service:8005"
            - name: services__ai-service__http__0
              value: "http://ai-service:8080"
            - name: services__cache-service__http__0
              value: "http://cache-service:8011"
            - name: services__message-service__http__0
              value: "http://message-service:8010"
            - name: services__accommodation-service__http__0
              value: "http://accommodation-service:8012"
            - name: services__product-service__http__0
              value: "http://product-service:8080"
            - name: services__document-service__http__0
              value: "http://document-service:8080"
            - name: services__search-service__http__0
              value: "http://search-service:8080"
            - name: services__innovation-service__http__0
              value: "http://innovation-service:8080"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
  namespace: go-nomads
spec:
  type: NodePort
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30080
  selector:
    app: gateway
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: go-nomads
  labels:
    app: user-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: go-nomads-user-service:local
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: "Development"
            - name: ASPNETCORE_URLS
              value: "http://+:8080"
            # Aspire ConnectionStrings
            - name: ConnectionStrings__redis
              value: "redis-service:6379,abortConnect=false"
            - name: ConnectionStrings__rabbitmq
              value: "amqp://guest:guest@rabbitmq-service:5672"
            # Aspire Service Discovery
            - name: services__city-service__http__0
              value: "http://city-service:8002"
            - name: services__product-service__http__0
              value: "http://product-service:8080"
            - name: services__event-service__http__0
              value: "http://event-service:8005"
            - name: services__message-service__http__0
              value: "http://message-service:8010"
            - name: Kestrel__Endpoints__Grpc__Url
              value: "http://0.0.0.0:50003"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: go-nomads
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8080
  selector:
    app: user-service
