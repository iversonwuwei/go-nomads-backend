name: go-nomads

# ============================================================
# 从华为云 SWR 拉取预构建镜像的 Docker Compose 配置
# 
# 使用方法:
#   启动服务: docker compose -f docker-compose-swr.yml up -d
#   停止服务: docker compose -f docker-compose-swr.yml down
#   停止并删除镜像: docker compose -f docker-compose-swr.yml down --rmi all
#   查看日志: docker compose -f docker-compose-swr.yml logs -f
#   更新镜像: docker compose -f docker-compose-swr.yml pull
# ============================================================

x-swr-registry: &swr-registry "swr.ap-southeast-3.myhuaweicloud.com/go-nomads"

services:
  # ============================================================
  # Nginx Reverse Proxy
  # ============================================================
  nginx:
    image: nginx:alpine
    container_name: go-nomads-nginx
    ports:
      - "5305:80"
      - "5343:443"
    volumes:
      - ./deployment/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - gateway
    networks:
      - go-nomads-network
    restart: unless-stopped

  # ============================================================
  # ============================================================
  gateway:
    image: swr.ap-southeast-3.myhuaweicloud.com/go-nomads/gateway:latest
    container_name: go-nomads-gateway
    ports:
      - "5080:5000"
    depends_on:
      - user-service
      - city-service
      - coworking-service
      - accommodation-service
      - event-service
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5000
    networks:
      - go-nomads-network

  user-service:
    image: swr.ap-southeast-3.myhuaweicloud.com/go-nomads/user-service:latest
    container_name: go-nomads-user-service
    ports:
      - "5001:5001"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5001
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=userservice_db;Username=postgres;Password=postgres
      - ConnectionStrings__Redis=go-nomads-redis:6379
    networks:
      - go-nomads-network

  city-service:
    image: swr.ap-southeast-3.myhuaweicloud.com/go-nomads/city-service:latest
    container_name: go-nomads-city-service
    ports:
      - "5202:5202"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5202
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=cityservice_db;Username=postgres;Password=postgres
      - ConnectionStrings__Redis=go-nomads-redis:6379
      - ConnectionStrings__Elasticsearch=http://go-nomads-elasticsearch:9200
      - RabbitMQ__Host=go-nomads-rabbitmq
      - RabbitMQ__Username=walden
      - RabbitMQ__Password=walden
    networks:
      - go-nomads-network

  coworking-service:
    image: swr.ap-southeast-3.myhuaweicloud.com/go-nomads/coworking-service:latest
    container_name: go-nomads-coworking-service
    ports:
      - "5203:5203"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5203
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=coworkingservice_db;Username=postgres;Password=postgres
      - ConnectionStrings__Redis=go-nomads-redis:6379
    networks:
      - go-nomads-network

  cache-service:
    image: swr.ap-southeast-3.myhuaweicloud.com/go-nomads/cache-service:latest
    container_name: go-nomads-cache-service
    ports:
      - "5210:5210"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5210
      - ConnectionStrings__Redis=go-nomads-redis:6379
    networks:
      - go-nomads-network

  accommodation-service:
    image: swr.ap-southeast-3.myhuaweicloud.com/go-nomads/accommodation-service:latest
    container_name: go-nomads-accommodation-service
    ports:
      - "5204:5204"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5204
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=accommodationservice_db;Username=postgres;Password=postgres
      - ConnectionStrings__Redis=go-nomads-redis:6379
    networks:
      - go-nomads-network

  event-service:
    image: swr.ap-southeast-3.myhuaweicloud.com/go-nomads/event-service:latest
    container_name: go-nomads-event-service
    ports:
      - "5205:5205"
    environment:
      - TZ=Asia/Shanghai
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5205
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=eventservice_db;Username=postgres;Password=postgres
      - ConnectionStrings__Redis=go-nomads-redis:6379
      - MessageBroker__Host=go-nomads-rabbitmq
    networks:
      - go-nomads-network

  product-service:
    image: swr.ap-southeast-3.myhuaweicloud.com/go-nomads/product-service:latest
    container_name: go-nomads-product-service
    ports:
      - "5002:5002"
    depends_on:
      - user-service
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5002
    networks:
      - go-nomads-network

  ai-service:
    image: swr.ap-southeast-3.myhuaweicloud.com/go-nomads/ai-service:latest
    container_name: go-nomads-ai-service
    ports:
      - "5209:5209"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5209
      - ConnectionStrings__SupabaseDb=Host=postgres;Port=5432;Database=aiservice_db;Username=postgres;Password=postgres
      - ConnectionStrings__Redis=go-nomads-redis:6379
      - ConnectionStrings__QianWenApiKey=${QIANWEN_API_KEY:-your-qianwen-api-key-here}
      - RabbitMQ__HostName=go-nomads-rabbitmq
      - Redis__ConnectionString=go-nomads-redis:6379,abortConnect=false
    networks:
      - go-nomads-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5209/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  message-service:
    image: swr.ap-southeast-3.myhuaweicloud.com/go-nomads/message-service:latest
    container_name: go-nomads-message-service
    ports:
      - "5005:5005"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5005
      - ConnectionStrings__Redis=go-nomads-redis:6379
      - RabbitMQ__HostName=go-nomads-rabbitmq
      - RabbitMQ__Port=5672
      - RabbitMQ__UserName=walden
      - RabbitMQ__Password=walden
    networks:
      - go-nomads-network

  innovation-service:
    image: swr.ap-southeast-3.myhuaweicloud.com/go-nomads/innovation-service:latest
    container_name: go-nomads-innovation-service
    ports:
      - "5206:5206"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5206
    networks:
      - go-nomads-network

  travel-planning-service:
    image: swr.ap-southeast-3.myhuaweicloud.com/go-nomads/travel-planning-service:latest
    container_name: go-nomads-travel-planning-service
    ports:
      - "5207:5207"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5207
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=travelplanningservice_db;Username=postgres;Password=postgres
      - ConnectionStrings__Redis=go-nomads-redis:6379
      - OpenAI__ApiKey=${OPENAI_API_KEY}
    networks:
      - go-nomads-network

  # ============================================================
  # ============================================================
  ecommerce-service:
    image: swr.ap-southeast-3.myhuaweicloud.com/go-nomads/ecommerce-service:latest
    container_name: go-nomads-ecommerce-service
    ports:
      - "5208:5208"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5208
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=ecommerceservice_db;Username=postgres;Password=postgres
      - ConnectionStrings__Redis=go-nomads-redis:6379
    networks:
      - go-nomads-network

  # ============================================================
  # Search Service
  # ============================================================
  search-service:
    image: swr.ap-southeast-3.myhuaweicloud.com/go-nomads/search-service:latest
    container_name: go-nomads-search-service
    ports:
      - "5215:5215"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5215
      - Elasticsearch__Url=http://go-nomads-elasticsearch:9200
      - ServiceUrls__CityService=http://go-nomads-city-service:5202
      - ServiceUrls__CoworkingService=http://go-nomads-coworking-service:5203
      - RabbitMQ__Host=go-nomads-rabbitmq
      - RabbitMQ__Username=walden
      - RabbitMQ__Password=walden
    networks:
      - go-nomads-network
    depends_on:
      - city-service
      - coworking-service

networks:
  go-nomads-network:
    external: true
