name: go-nomads

services:
  # ============================================================
  # ============================================================
  gateway:
    image: swr.ap-southeast-3.myhuaweicloud.com/go-nomads/gateway:latest
    container_name: go-nomads-gateway
    ports:
      - "5080:5000"
    depends_on:
      - user-service
      - city-service
      - coworking-service
      - accommodation-service
      - event-service
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5000
    networks:
      - go-nomads-network

  document-service:
    image: swr.ap-southeast-3.myhuaweicloud.com/go-nomads/document-service:latest
    container_name: go-nomads-document-service
    ports:
      - "5003:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - Services__Gateway__Url=http://go-nomads-gateway:8080
      - Services__Gateway__OpenApiUrl=http://go-nomads-gateway:8080/openapi/v1.json
      - Services__ProductService__Url=http://go-nomads-product-service:8080
      - Services__ProductService__OpenApiUrl=http://go-nomads-product-service:8080/openapi/v1.json
      - Services__UserService__Url=http://go-nomads-user-service:8080
      - Services__UserService__OpenApiUrl=http://go-nomads-user-service:8080/openapi/v1.json
    networks:
      - go-nomads-network
    depends_on:

  user-service:
    image: swr.ap-southeast-3.myhuaweicloud.com/go-nomads/user-service:latest
    container_name: go-nomads-user-service
    ports:
      - "5001:8080"
      - "50002:50002"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=userservice_db;Username=postgres;Password=postgres
      - ConnectionStrings__Redis=go-nomads-redis:6379
      # 阿里云短信服务 - 通过环境变量注入密钥，请勿明文写入配置文件
      - AliyunSms__AccessKeyId=${ALIYUN_SMS_ACCESS_KEY_ID}
      - AliyunSms__AccessKeySecret=${ALIYUN_SMS_ACCESS_KEY_SECRET}
    networks:
      - go-nomads-network
    depends_on:

  city-service:
    image: swr.ap-southeast-3.myhuaweicloud.com/go-nomads/city-service:latest
    container_name: go-nomads-city-service
    ports:
      - "8002:8002"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8002
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=cityservice_db;Username=postgres;Password=postgres
      - ConnectionStrings__Redis=go-nomads-redis:6379
      - ConnectionStrings__Elasticsearch=http://go-nomads-elasticsearch:9200
      - RabbitMQ__Host=go-nomads-rabbitmq
      - RabbitMQ__Username=walden
      - RabbitMQ__Password=walden
    networks:
      - go-nomads-network
    depends_on:

  coworking-service:
    image: swr.ap-southeast-3.myhuaweicloud.com/go-nomads/coworking-service:latest
    container_name: go-nomads-coworking-service
    ports:
      - "8006:8006"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8006
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=coworkingservice_db;Username=postgres;Password=postgres
      - ConnectionStrings__Redis=go-nomads-redis:6379
    networks:
      - go-nomads-network
    depends_on:

  cache-service:
    image: swr.ap-southeast-3.myhuaweicloud.com/go-nomads/cache-service:latest
    container_name: go-nomads-cache-service
    ports:
      - "8010:8010"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8010
      - ConnectionStrings__Redis=go-nomads-redis:6379
    networks:
      - go-nomads-network
    depends_on:

  accommodation-service:
    image: swr.ap-southeast-3.myhuaweicloud.com/go-nomads/accommodation-service:latest
    container_name: go-nomads-accommodation-service
    ports:
      - "8012:8012"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8012
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=accommodationservice_db;Username=postgres;Password=postgres
      - ConnectionStrings__Redis=go-nomads-redis:6379
    networks:
      - go-nomads-network
    depends_on:

  event-service:
    image: swr.ap-southeast-3.myhuaweicloud.com/go-nomads/event-service:latest
    container_name: go-nomads-event-service
    ports:
      - "8005:8005"
    environment:
      - TZ=Asia/Shanghai
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8005
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=eventservice_db;Username=postgres;Password=postgres
      - ConnectionStrings__Redis=go-nomads-redis:6379
      - MessageBroker__Host=go-nomads-rabbitmq
    networks:
      - go-nomads-network
    depends_on:

  product-service:
    image: swr.ap-southeast-3.myhuaweicloud.com/go-nomads/product-service:latest
    container_name: go-nomads-product-service
    ports:
      - "5002:5002"
    depends_on:
      - user-service
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5002
    networks:
      - go-nomads-network

  ai-service:
    image: swr.ap-southeast-3.myhuaweicloud.com/go-nomads/ai-service:latest
    container_name: go-nomads-ai-service
    ports:
      - "8009:8009"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8009
      - ConnectionStrings__SupabaseDb=Host=postgres;Port=5432;Database=aiservice_db;Username=postgres;Password=postgres
      - ConnectionStrings__Redis=go-nomads-redis:6379
      - ConnectionStrings__QianWenApiKey=${QIANWEN_API_KEY:-your-qianwen-api-key-here}
      - RabbitMQ__HostName=go-nomads-rabbitmq
      - Redis__ConnectionString=go-nomads-redis:6379,abortConnect=false
    networks:
      - go-nomads-network
    labels:
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8009/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:

  message-service:
    image: swr.ap-southeast-3.myhuaweicloud.com/go-nomads/message-service:latest
    container_name: go-nomads-message-service
    ports:
      - "5005:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__Redis=go-nomads-redis:6379
      - RabbitMQ__HostName=go-nomads-rabbitmq
      - RabbitMQ__Port=5672
      - RabbitMQ__UserName=walden
      - RabbitMQ__Password=walden
    networks:
      - go-nomads-network
    depends_on:

  innovation-service:
    image: swr.ap-southeast-3.myhuaweicloud.com/go-nomads/innovation-service:latest
    container_name: go-nomads-innovation-service
    ports:
      - "8011:8011"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8011
    networks:
      - go-nomads-network
    depends_on:

  search-service:
    image: swr.ap-southeast-3.myhuaweicloud.com/go-nomads/search-service:latest
    container_name: go-nomads-search-service
    ports:
      - "8015:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - Elasticsearch__Url=http://go-nomads-elasticsearch:9200
      - ServiceUrls__CityService=http://go-nomads-city-service:8002
      - ServiceUrls__CoworkingService=http://go-nomads-coworking-service:8006
      - RabbitMQ__Host=go-nomads-rabbitmq
      - RabbitMQ__Username=walden
      - RabbitMQ__Password=walden
    networks:
      - go-nomads-network
    depends_on:
      - city-service
      - coworking-service

  go-nomads-network:
    external: true
    name: go-nomads-network
