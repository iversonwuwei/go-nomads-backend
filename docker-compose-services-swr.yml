name: go-nomads

services:
  # ============================================================
  # ============================================================
  gateway:
    image: swr.ap-southeast-3.myhuaweicloud.com/go-nomads/gateway:latest
    container_name: go-nomads-gateway
    ports:
      - "5080:5000"
    depends_on:
      - user-service
      - city-service
      - coworking-service
      - accommodation-service
      - event-service
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      ASPNETCORE_URLS: "http://+:5000"
      OTEL_SERVICE_NAME: "gateway"
      ConnectionStrings__Redis: "go-nomads-redis:6379"
      ServiceUrls__UserService: "http://go-nomads-user-service:5001"
      ServiceUrls__CityService: "http://go-nomads-city-service:5202"
      ServiceUrls__CoworkingService: "http://go-nomads-coworking-service:5203"
      ServiceUrls__EventService: "http://go-nomads-event-service:5205"
      ServiceUrls__AIService: "http://go-nomads-ai-service:5209"
      ServiceUrls__CacheService: "http://go-nomads-cache-service:5210"
      ServiceUrls__MessageService: "http://go-nomads-message-service:5005"
      ServiceUrls__InnovationService: "http://go-nomads-innovation-service:5206"
      ServiceUrls__SearchService: "http://go-nomads-search-service:5215"
      ServiceUrls__AccommodationService: "http://go-nomads-accommodation-service:5204"
      ServiceUrls__ProductService: "http://go-nomads-product-service:5002"
      ServiceUrls__ConfigService: "http://go-nomads-config-service:5213"
    networks:
      - go-nomads-network

  document-service:
    image: swr.ap-southeast-3.myhuaweicloud.com/go-nomads/document-service:latest
    container_name: go-nomads-document-service
    ports:
      - "5003:5003"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5003
      - ConnectionStrings__Redis=go-nomads-redis:6379
      - Services__Gateway__Url=http://go-nomads-gateway:5000
      - Services__Gateway__OpenApiUrl=http://go-nomads-gateway:5000/openapi/v1.json
      - Services__ProductService__Url=http://go-nomads-product-service:5002
      - Services__ProductService__OpenApiUrl=http://go-nomads-product-service:5002/openapi/v1.json
      - Services__UserService__Url=http://go-nomads-user-service:5001
      - Services__UserService__OpenApiUrl=http://go-nomads-user-service:5001/openapi/v1.json
    networks:
      - go-nomads-network

  user-service:
    image: swr.ap-southeast-3.myhuaweicloud.com/go-nomads/user-service:latest
    container_name: go-nomads-user-service
    ports:
      - "5001:5001"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5001
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=userservice_db;Username=postgres;Password=postgres
      - ConnectionStrings__Redis=go-nomads-redis:6379
      - RabbitMQ__Host=go-nomads-rabbitmq
      - RabbitMQ__Port=5672
      - RabbitMQ__Username=walden
      - RabbitMQ__Password=walden
      # 阿里云短信服务 - 通过环境变量注入密钥，请勿明文写入配置文件
      - AliyunSms__AccessKeyId=${ALIYUN_SMS_ACCESS_KEY_ID}
      - AliyunSms__AccessKeySecret=${ALIYUN_SMS_ACCESS_KEY_SECRET}
      # 微信 OAuth 登录
      - WeChat__AppId=${WECHAT_APP_ID}
      - WeChat__AppSecret=${WECHAT_APP_SECRET}
      # 微信支付 V3
      - WeChatPay__AppId=${WECHAT_PAY_APP_ID}
      - WeChatPay__MchId=${WECHAT_PAY_MCH_ID}
      - WeChatPay__ApiV3Key=${WECHAT_PAY_API_V3_KEY}
      - WeChatPay__CertificateSerialNumber=${WECHAT_PAY_CERTIFICATE_SERIAL_NUMBER}
      - WeChatPay__PrivateKey=${WECHAT_PAY_PRIVATE_KEY}
      - WeChatPay__NotifyUrl=${WECHAT_PAY_NOTIFY_URL:-https://api.go-nomads.com/api/v1/payments/webhooks/wechat}
    networks:
      - go-nomads-network

  city-service:
    image: swr.ap-southeast-3.myhuaweicloud.com/go-nomads/city-service:latest
    container_name: go-nomads-city-service
    ports:
      - "5202:5202"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5202
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=cityservice_db;Username=postgres;Password=postgres
      - ConnectionStrings__Redis=go-nomads-redis:6379
      - ConnectionStrings__Elasticsearch=http://go-nomads-elasticsearch:9200
      - RabbitMQ__Host=go-nomads-rabbitmq
      - RabbitMQ__Username=walden
      - RabbitMQ__Password=walden
    networks:
      - go-nomads-network

  coworking-service:
    image: swr.ap-southeast-3.myhuaweicloud.com/go-nomads/coworking-service:latest
    container_name: go-nomads-coworking-service
    ports:
      - "5203:5203"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5203
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=coworkingservice_db;Username=postgres;Password=postgres
      - ConnectionStrings__Redis=go-nomads-redis:6379
      - RabbitMQ__Host=go-nomads-rabbitmq
      - RabbitMQ__Port=5672
      - RabbitMQ__Username=walden
      - RabbitMQ__Password=walden
    networks:
      - go-nomads-network

  cache-service:
    image: swr.ap-southeast-3.myhuaweicloud.com/go-nomads/cache-service:latest
    container_name: go-nomads-cache-service
    ports:
      - "5210:5210"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5210
      - ConnectionStrings__Redis=go-nomads-redis:6379
    networks:
      - go-nomads-network

  accommodation-service:
    image: swr.ap-southeast-3.myhuaweicloud.com/go-nomads/accommodation-service:latest
    container_name: go-nomads-accommodation-service
    ports:
      - "5204:5204"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5204
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=accommodationservice_db;Username=postgres;Password=postgres
      - ConnectionStrings__Redis=go-nomads-redis:6379
    networks:
      - go-nomads-network

  event-service:
    image: swr.ap-southeast-3.myhuaweicloud.com/go-nomads/event-service:latest
    container_name: go-nomads-event-service
    ports:
      - "5205:5205"
    environment:
      - TZ=Asia/Shanghai
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5205
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=eventservice_db;Username=postgres;Password=postgres
      - ConnectionStrings__Redis=go-nomads-redis:6379
      - RabbitMQ__Host=go-nomads-rabbitmq
      - RabbitMQ__Port=5672
      - RabbitMQ__Username=walden
      - RabbitMQ__Password=walden
    networks:
      - go-nomads-network

  product-service:
    image: swr.ap-southeast-3.myhuaweicloud.com/go-nomads/product-service:latest
    container_name: go-nomads-product-service
    ports:
      - "5002:5002"
    depends_on:
      - user-service
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5002
    networks:
      - go-nomads-network

  ai-service:
    image: swr.ap-southeast-3.myhuaweicloud.com/go-nomads/ai-service:latest
    container_name: go-nomads-ai-service
    ports:
      - "5209:5209"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5209
      - ConnectionStrings__SupabaseDb=Host=postgres;Port=5432;Database=aiservice_db;Username=postgres;Password=postgres
      - ConnectionStrings__Redis=go-nomads-redis:6379
      - ConnectionStrings__QianWenApiKey=${QIANWEN_API_KEY:-your-qianwen-api-key-here}
      - RabbitMQ__HostName=go-nomads-rabbitmq
      - Redis__ConnectionString=go-nomads-redis:6379,abortConnect=false
    networks:
      - go-nomads-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5209/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  message-service:
    image: swr.ap-southeast-3.myhuaweicloud.com/go-nomads/message-service:latest
    container_name: go-nomads-message-service
    ports:
      - "5005:5005"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5005
      - ConnectionStrings__Redis=go-nomads-redis:6379
      - RabbitMQ__HostName=go-nomads-rabbitmq
      - RabbitMQ__Port=5672
      - RabbitMQ__UserName=walden
      - RabbitMQ__Password=walden
    networks:
      - go-nomads-network

  innovation-service:
    image: swr.ap-southeast-3.myhuaweicloud.com/go-nomads/innovation-service:latest
    container_name: go-nomads-innovation-service
    ports:
      - "5206:5206"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5206
      - RabbitMQ__Host=go-nomads-rabbitmq
      - RabbitMQ__Port=5672
      - RabbitMQ__Username=walden
      - RabbitMQ__Password=walden
    networks:
      - go-nomads-network

  search-service:
    image: swr.ap-southeast-3.myhuaweicloud.com/go-nomads/search-service:latest
    container_name: go-nomads-search-service
    ports:
      - "5215:5215"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5215
      - Elasticsearch__Url=http://go-nomads-elasticsearch:9200
      - ServiceUrls__CityService=http://go-nomads-city-service:5202
      - ServiceUrls__CoworkingService=http://go-nomads-coworking-service:5203
      - RabbitMQ__Host=go-nomads-rabbitmq
      - RabbitMQ__Username=walden
      - RabbitMQ__Password=walden
    networks:
      - go-nomads-network
    depends_on:
      - city-service
      - coworking-service

  config-service:
    image: swr.ap-southeast-3.myhuaweicloud.com/go-nomads/config-service:latest
    container_name: go-nomads-config-service
    ports:
      - "5213:5213"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5213
    networks:
      - go-nomads-network

networks:
  go-nomads-network:
    external: true
    name: go-nomads-network
